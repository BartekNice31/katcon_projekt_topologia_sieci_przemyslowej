<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>{%block title%}Moja aplikacja{%endblock%}</title>

    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main_database.css' %}">

    {% block production_lines_stylesheet_css %}
    {% endblock %}
</head>
<body>

<header class="container mt-3">
    {% block header %}{% endblock %}
</header>

<div class="container mt-4">
    {% bootstrap_messages %}

    {% block content %}
    {% endblock %}
</div>

{% bootstrap_javascript %}
</body>
</html>
