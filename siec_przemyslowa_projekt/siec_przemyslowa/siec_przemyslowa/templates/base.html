<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>{%block title%}Moja aplikacja{%endblock%}</title>

    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/homepage.css' %}">
</head>
<body>

<header class="container mt-3">
    {% block header %}{% endblock %}
</header>

<div class="container mt-4">
    {% bootstrap_messages %}

    {% block content %}
    {% endblock %}
</div>
<footer class="text-center mt-5 py-3 border-top">
    <p class="mb-0">© Copyright Barłomiej Nicewicz</p>
</footer>  

{% bootstrap_javascript %}

</body>
</html>
